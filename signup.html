<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Epictetus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #1a1815;
      color: #d4cfc4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 420px;
    }
    h1 {
      font-size: 28px;
      font-weight: normal;
      color: #b8a878;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 14px;
      color: #8a7d68;
      margin-bottom: 32px;
      font-style: italic;
    }
    form {
      background: #232019;
      border: 1px solid #3a352c;
      padding: 28px;
      border-radius: 4px;
    }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8a7d68;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    label:first-child { margin-top: 0; }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: #15130f;
      color: #d4cfc4;
      border: 1px solid #3a352c;
      padding: 12px;
      font-family: Georgia, serif;
      font-size: 15px;
      border-radius: 3px;
    }
    input:focus { outline: none; border-color: #8a7d68; }
    button {
      width: 100%;
      background: #b8a878;
      color: #1a1815;
      border: none;
      padding: 14px;
      font-family: Georgia, serif;
      font-size: 15px;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.5px;
      margin-top: 24px;
    }
    button:hover { background: #c4b485; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .footer-link {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #8a7d68;
    }
    .footer-link a {
      color: #b8a878;
      text-decoration: none;
    }
    .footer-link a:hover { text-decoration: underline; }
    .error {
      background: #3d1f1f;
      border: 1px solid #6d3838;
      color: #d4a8a8;
      padding: 12px;
      border-radius: 3px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .hint {
      font-size: 12px;
      color: #6a5f4e;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Enter the school</h1>
    <p class="subtitle">Begin where Epictetus began — with your name and a promise.</p>

    <form id="signup-form">
      <div id="error-box"></div>

      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="new-password" minlength="8" />
      <div class="hint">At least 8 characters.</div>

      <button type="submit" id="submit-btn">Create account</button>
    </form>

    <p class="footer-link">
      Already have an account? <a href="/login.html">Sign in</a>
    </p>
  </div>

  <script type="module">
    import { supabase, redirectIfAuth } from "/supabase-client.js";

    // If user already logged in, send them away
    redirectIfAuth();

    const form = document.getElementById("signup-form");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const submitBtn = document.getElementById("submit-btn");
    const errorBox = document.getElementById("error-box");

    function showError(msg) {
      errorBox.innerHTML = `<div class="error">${msg}</div>`;
    }
    function clearError() {
      errorBox.innerHTML = "";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();

      const email = emailEl.value.trim();
      const password = passwordEl.value;

      if (password.length < 8) {
        showError("Password must be at least 8 characters.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account...";

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
      });

      if (error) {
        showError(error.message);
        submitBtn.disabled = false;
        submitBtn.textContent = "Create account";
        return;
      }

      if (!data.session) {
        // Email confirmation required (depends on Supabase settings)
        // For v1, we expect this to be disabled, so this branch shouldn't fire
        showError("Account created. Check your email to confirm before signing in.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Create account";
        return;
      }

      // Logged in — redirect to welcome
      window.location.href = "/welcome.html";
    });
  </script>
</body>
</html>
