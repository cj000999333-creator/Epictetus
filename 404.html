<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Epictetus</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231A1710' stroke='%23C9A84C' stroke-width='4'/><circle cx='50' cy='50' r='38' fill='%23141208' stroke='%238A6A20' stroke-width='1.5'/><text x='50' y='66' text-anchor='middle' font-family='Georgia,serif' font-size='52' fill='%23C9A84C'>E</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Cinzel:wght@400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#12100C;--panel:#1A1710;--text:#F0E8D8;--textmuted:#C0A878;--textdim:#7A6A4A;--gold:#C9A84C;--gold-dk:#8A6A20;--border:#2A2418;}
html,body{height:100%;background:var(--bg);color:var(--text);}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;font-family:'EB Garamond',serif;}
.medallion{margin-bottom:2rem;opacity:.6;}
.code{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:1.5rem;display:block;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:300;color:var(--text);margin-bottom:1rem;}
.quote{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--textmuted);line-height:1.7;max-width:500px;margin:0 auto 2rem;border-left:2px solid var(--gold-dk);padding-left:1.2rem;text-align:left;}
.cite{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.15em;color:var(--textdim);text-transform:uppercase;display:block;margin-top:.5rem;}
.home-btn{background:var(--gold-dk);color:var(--text);border:1px solid var(--gold);padding:.65rem 1.8rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;transition:all .2s;display:inline-block;margin-top:1rem;}
.home-btn:hover{background:var(--gold);}
</style>
</head>
<body>
  <svg class="medallion" viewBox="0 0 200 200" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="96" fill="#1A1810" stroke="#C9A84C" stroke-width="2.5"/>
    <circle cx="100" cy="100" r="86" fill="#141208" stroke="#8A6A20" stroke-width="0.8"/>
    <circle cx="100" cy="100" r="74" fill="#0E0C08"/>
    <text x="100" y="132" text-anchor="middle" font-family="Georgia,serif" font-size="110" fill="#C9A84C" opacity="0.93">E</text>
  </svg>
  <span class="code">404</span>
  <h1>This page does not exist.</h1>
  <div class="quote">
    Seek not that the things which happen should happen as you wish; but wish the things which happen to be as they are, and you will have a tranquil flow of life.
    <span class="cite">— Epictetus · Enchiridion · Chapter 8</span>
  </div>
  <a href="/" class="home-btn">Return to the School</a>
</body>
</html>
