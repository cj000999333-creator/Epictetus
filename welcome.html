<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — Epictetus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #1a1815;
      color: #d4cfc4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      font-size: 13px;
    }
    .user-info {
      color: #6a5f4e;
      margin-right: 16px;
    }
    .signout-btn {
      background: transparent;
      color: #8a7d68;
      border: 1px solid #3a352c;
      padding: 6px 14px;
      font-family: Georgia, serif;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }
    .signout-btn:hover { color: #d4cfc4; border-color: #8a7d68; }
    .container {
      max-width: 720px;
      width: 100%;
      margin: 80px auto 0;
      flex: 1;
    }
    h1 {
      font-size: 32px;
      font-weight: normal;
      color: #b8a878;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    p {
      font-size: 17px;
      line-height: 1.7;
      color: #d4cfc4;
      margin-bottom: 18px;
    }
    p.aside {
      font-size: 14px;
      color: #8a7d68;
      font-style: italic;
    }
    .loading {
      color: #6a5f4e;
      font-style: italic;
    }
    .primary-btn {
      background: #b8a878;
      color: #1a1815;
      border: none;
      padding: 14px 28px;
      font-family: Georgia, serif;
      font-size: 15px;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.5px;
      margin-top: 16px;
    }
    .primary-btn:hover { background: #c4b485; }
    .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="top-bar">
    <span class="user-info" id="user-email"></span>
    <button class="signout-btn" id="signout-btn">Sign out</button>
  </div>

  <div class="container" id="content">
    <p class="loading">Loading…</p>
  </div>

  <script type="module">
    import { supabase, requireAuth, signOut } from "/supabase-client.js";

    const user = await requireAuth();
    if (!user) {
      // requireAuth already redirected to /login.html
    } else {
      document.getElementById("user-email").textContent = user.email;

      const content = document.getElementById("content");
      content.innerHTML = `
        <h1>You have come to the door.</h1>
        <p>Good. Few who say they want a teacher actually arrive.</p>
        <p>What waits next is the Intake — the first session, where I learn who has come. It is free. It happens once.</p>
        <p>After the Intake, you decide: enter the school, or walk away. Both are answers. Only one is yours to make.</p>
        <p class="aside">The Intake will open shortly. The work is still being prepared.</p>
        <button class="primary-btn" disabled>Begin the Intake (coming soon)</button>
      `;

      document.getElementById("signout-btn").addEventListener("click", async () => {
        await signOut();
      });
    }
  </script>
</body>
</html>
