<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Epictetus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #1a1815;
      color: #d4cfc4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 420px;
    }
    h1 {
      font-size: 28px;
      font-weight: normal;
      color: #b8a878;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 14px;
      color: #8a7d68;
      margin-bottom: 32px;
      font-style: italic;
    }
    form {
      background: #232019;
      border: 1px solid #3a352c;
      padding: 28px;
      border-radius: 4px;
    }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8a7d68;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    label:first-child { margin-top: 0; }
    input[type="password"], input[type="text"] {
      width: 100%;
      background: #15130f;
      color: #d4cfc4;
      border: 1px solid #3a352c;
      padding: 12px;
      font-family: Georgia, serif;
      font-size: 15px;
      border-radius: 3px;
    }
    input:focus { outline: none; border-color: #8a7d68; }
    button {
      width: 100%;
      background: #b8a878;
      color: #1a1815;
      border: none;
      padding: 14px;
      font-family: Georgia, serif;
      font-size: 15px;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.5px;
      margin-top: 24px;
    }
    button:hover { background: #c4b485; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      color: #8a7d68;
      border: 1px solid #3a352c;
      margin-top: 8px;
      padding: 10px;
      font-size: 13px;
    }
    button.secondary:hover { color: #d4cfc4; border-color: #8a7d68; background: transparent; }
    .hint {
      font-size: 12px;
      color: #6a5f4e;
      margin-top: 4px;
    }
    .stoic-hint {
      font-size: 12px;
      color: #8a7d68;
      margin-top: 8px;
      font-style: italic;
      min-height: 16px;
    }
    .stoic-hint .word {
      color: #b8a878;
      font-style: normal;
      letter-spacing: 0.3px;
    }
    .error {
      background: #3d1f1f;
      border: 1px solid #6d3838;
      color: #d4a8a8;
      padding: 12px;
      border-radius: 3px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .success {
      background: #1f3d24;
      border: 1px solid #386d3f;
      color: #a8d4af;
      padding: 12px;
      border-radius: 3px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .invalid-state {
      background: #232019;
      border: 1px solid #3a352c;
      padding: 28px;
      border-radius: 4px;
      text-align: center;
    }
    .invalid-state p { margin-bottom: 12px; font-size: 15px; }
    .invalid-state a { color: #b8a878; text-decoration: none; }
    .invalid-state a:hover { text-decoration: underline; }
    .show-pw {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: 12px;
      color: #6a5f4e;
      cursor: pointer;
      user-select: none;
    }
    .show-pw input { width: auto; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Set a new password</h1>
    <p class="subtitle">The link from the email gives you one chance. Use it.</p>

    <div id="content">
      <div class="hint">Verifying link...</div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "/supabase-client.js";
    import { generateStoicPassword } from "/stoic-words.js";

    const content = document.getElementById("content");

    async function init() {
      await new Promise(r => setTimeout(r, 500));

      const { data: { session } } = await supabase.auth.getSession();

      if (!session) {
        content.innerHTML = `
          <div class="invalid-state">
            <p>This reset link is invalid or has expired.</p>
            <p>Request a new one:</p>
            <p><a href="/login.html">Back to sign in</a></p>
          </div>
        `;
        return;
      }

      content.innerHTML = `
        <form id="reset-form">
          <div id="msg-box"></div>

          <label for="new-password">New password</label>
          <input type="password" id="new-password" required minlength="8" autocomplete="new-password" />
          <div class="hint">At least 8 characters.</div>

          <label for="confirm-password">Confirm</label>
          <input type="password" id="confirm-password" required minlength="8" autocomplete="new-password" />

          <button type="button" class="secondary" id="generate-btn">Suggest a Stoic password</button>
          <div class="stoic-hint" id="stoic-hint" title=""></div>

          <label class="show-pw">
            <input type="checkbox" id="show-pw-toggle" />
            Show passwords
          </label>

          <button type="submit" id="submit-btn">Set new password</button>
        </form>
      `;

      const form = document.getElementById("reset-form");
      const newPwEl = document.getElementById("new-password");
      const confirmPwEl = document.getElementById("confirm-password");
      const submitBtn = document.getElementById("submit-btn");
      const msgBox = document.getElementById("msg-box");
      const generateBtn = document.getElementById("generate-btn");
      const stoicHint = document.getElementById("stoic-hint");
      const showPwToggle = document.getElementById("show-pw-toggle");

      function showError(msg) {
        msgBox.innerHTML = `<div class="error">${msg}</div>`;
      }
      function showSuccess(msg) {
        msgBox.innerHTML = `<div class="success">${msg}</div>`;
      }
      function clearMsg() {
        msgBox.innerHTML = "";
      }

      generateBtn.addEventListener("click", () => {
        const { password, word, meaning } = generateStoicPassword();
        newPwEl.value = password;
        confirmPwEl.value = password;
        stoicHint.innerHTML = `<span class="word">${word}</span> — ${meaning}`;
        stoicHint.title = meaning;
      });

      showPwToggle.addEventListener("change", () => {
        const type = showPwToggle.checked ? "text" : "password";
        newPwEl.type = type;
        confirmPwEl.type = type;
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMsg();

        const newPw = newPwEl.value;
        const confirmPw = confirmPwEl.value;

        if (newPw.length < 8) {
          showError("Password must be at least 8 characters.");
          return;
        }
        if (newPw !== confirmPw) {
          showError("The two passwords do not match.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Setting...";

        const { error } = await supabase.auth.updateUser({ password: newPw });

        if (error) {
          showError(error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = "Set new password";
          return;
        }

        showSuccess("Password set. Redirecting...");
        setTimeout(() => {
          window.location.href = "/welcome.html";
        }, 1500);
      });
    }

    init();
  </script>
</body>
</html>
